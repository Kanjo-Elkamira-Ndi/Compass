server:
  port: 8080

spring:
  application:
    name: compass-advisor

  datasource:
    url: jdbc:postgresql://localhost:5432/compass_ai
    username: postgres
    password: codex4587
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false

  data:
    redis:
      url: redis://localhost:6379

  ai:
    active-provider: openai

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: dev-only-change-in-production-minimum-256-bits-required-for-hs256-algorithm
    access-token-expiration-ms: 900000
    refresh-token-expiration-days: 7
  ai:
    openai:
      api-key:
    gemini:
      api-key:
